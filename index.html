    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1410;
        transition: opacity 200ms ease;
      }
      #splash.is-hidden {
        opacity: 0;
      }
      #splash img {
        width: 96px;
        height: 96px;
        animation: splash-pulse 900ms ease-in-out infinite alternate;
      }
      @keyframes splash-pulse {
        from {
          opacity: 0.55;
          transform: scale(0.94);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="splash" aria-hidden="true">
      <img src="/favicon.svg" alt="" width="96" height="96" />
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
